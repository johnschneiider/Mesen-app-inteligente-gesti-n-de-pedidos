{% load mesenu_tags %}
<div style="display:flex;flex-wrap:wrap;gap:8px;">
    {% for photo in menu.photos.all %}
    <div style="position:relative;width:72px;height:72px;">
        <img src="{{ photo.image.url }}" alt="" style="width:72px;height:72px;object-fit:cover;border-radius:6px;border:1px solid var(--border);">
    </div>
    {% empty %}
    <div style="font-size:12px;color:var(--text-3);">Sin fotos</div>
    {% endfor %}
</div>
