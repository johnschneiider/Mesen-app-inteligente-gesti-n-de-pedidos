<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mesenú{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    {% block extra_css %}{% endblock %}
    <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
    <script src="{% static 'js/utils.js' %}" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <script>
        document.addEventListener('htmx:configRequest', function(event) {
            event.detail.headers['X-CSRFToken'] = document.querySelector('meta[name="csrf-token"]').content;
        });
    </script>
    <style>
        /* Hide Alpine-controlled elements before JS initialises */
        [x-cloak] { display: none !important; }

        /* Toast styles */
        .ws-toast, .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--white);
            border: 0.5px solid var(--border-med);
            border-left: 3px solid var(--green);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 3px;
            font-size: 13px;
            max-width: 300px;
            animation: slideIn 0.2s ease;
        }
        .toast-error { border-left-color: var(--red); }
        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
