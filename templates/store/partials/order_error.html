<div style="text-align:center;padding:20px 0;">
    <div style="width:48px;height:48px;border-radius:50%;background:#FEE2E2;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M6 6l10 10M16 6L6 16" stroke="#DC2626" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
    <h3 style="font-size:16px;font-weight:700;margin-bottom:4px;">Error al procesar pedido</h3>
    <p style="font-size:13px;color:var(--text-2);margin-bottom:16px;">{{ error_message|default:"No se pudo crear el pedido. Verifica los datos e intenta de nuevo." }}</p>
    <button
        hx-get="{{ retry_url }}"
        hx-target="#menu-detail-modal-content"
        hx-swap="innerHTML"
        class="btn-ghost">
        Intentar de nuevo
    </button>
</div>
