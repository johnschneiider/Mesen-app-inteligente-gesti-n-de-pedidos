<div class="modal" x-data style="position:relative;">
    <button @click="$dispatch('close-modal')" style="position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;color:var(--text-3);">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;">
        {% load static %}
        <img src="{% static 'img/logo.svg' %}" width="24" height="24" alt="Logo">
        <span class="modal-title" style="margin-bottom:0;">Inicia sesión para pedir</span>
    </div>

    {% if form.non_field_errors %}
    <div class="alert-error" style="margin-bottom:14px;">{{ form.non_field_errors.0 }}</div>
    {% endif %}

    <form method="post" action="{% url 'accounts:login_modal' %}"
          hx-post="{% url 'accounts:login_modal' %}"
          hx-target="closest .modal-backdrop"
          hx-swap="outerHTML">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <div class="form-group">
            <label>Teléfono</label>
            <input type="tel" name="phone" placeholder="3001234567" autofocus>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="Contraseña">
        </div>
        <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:10px;">
            Entrar
        </button>
        <p style="text-align:center;margin-top:14px;font-size:12px;color:var(--text-3);">
            ¿Sin cuenta? <a href="{% url 'accounts:register' %}" style="color:var(--green);">Regístrate</a>
        </p>
    </form>
</div>
